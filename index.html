<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionario</title>

<style>
    .formulario input,
.formulario textarea{
    width:100%;
    padding:5px;
    margin-top:3px;
    border:2px solid white;
    background:black;
    color:white;
    transition:0.3s;
}

/* Cuando pasas el cursor encima */
.formulario input:hover,
.formulario textarea:hover{
    border-color:#00ffff;
    box-shadow:0 0 10px #00ffff,
               0 0 20px #00ffff;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:white;
    font-family:Arial, sans-serif;
}

.formulario{
    width:30%;
    min-width:350px;
    height:400px;
    background:black;
    border:2px solid red;
    color:white;
    padding:15px;
    margin:40px;
}

.formulario label{
    display:block;
    margin-top:10px;
    font-weight:bold;
}

.formulario input,
.formulario textarea{
    width:100%;
    padding:5px;
    margin-top:3px;
}

.formulario textarea{
    height:120px;
    resize:none;
}

.boton{
    margin-top:10px;
    padding:8px 15px;
    background:#00cccc;
    color:white;
    border:none;
    cursor:pointer;
    transition:0.3s;
}

/* Efecto de iluminación */
.boton:hover{
    background:#00ffff;
    box-shadow:0 0 10px #00ffff,
               0 0 20px #00ffff,
               0 0 30px #00ffff;
}
</style>
</head>

<body>

<div class="formulario">

    <label>NOMBRE</label>
    <input type="text">

    <label>APELLIDOS</label>
    <input type="text">

    <label>TELEFONO</label>
    <input type="tel">

    <label>CORREO</label>
    <input type="email">

    <label>COMENTARIOS</label>
    <input type="text">

    <button class="boton">ENVIAR SOLICITUD</button>

</div>

</body>
</html>
