<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionario</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:white;
    font-family:Arial, Helvetica, sans-serif;
}

.formulario{
    width:30%;
    min-width:350px;
    height:450px;
    background:black;
    border:2px solid red;
    padding:15px;
    margin:40px;
    color:white;
}

label{
    display:block;
    margin-top:10px;
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:6px;
    margin-top:4px;
    background:black;
    color:white;
    border:2px solid white;
    transition:all 0.3s ease;
}

textarea{
    height:120px;
    resize:none;
}

/* Efecto al seleccionar la caja */
input:focus,
textarea:focus{
    outline:none;
    border:3px solid yellow;
    transform:scale(1.05);
    box-shadow:
        0 0 5px yellow,
        0 0 10px yellow,
        0 0 20px yellow;
}

/* Botón */
button{
    margin-top:10px;
    padding:8px 15px;
    background:#00cccc;
    color:white;
    border:none;
    cursor:pointer;
    transition:0.3s;
}

/* Botón iluminado */
button:hover{
    background:#00ffff;
    box-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 30px #00ffff;
}

</style>
</head>

<body>

<div class="formulario">

    <label>NOMBRE</label>
    <input type="text">

    <label>APELLIDOS</label>
    <input type="text">

    <label>TELEFONO</label>
    <input type="tel">

    <label>CORREO</label>
    <input type="email">

    <label>COMENTARIOS</label>
    <textarea></textarea>

    <button>ENVIAR SOLICITUD</button>

</div>

</body>
</html>
